name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  javascript:
    name: JavaScript and protocol
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test

  swift:
    name: Swift package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift test
        working-directory: apps/macos
      - run: swift build
        working-directory: apps/macos
